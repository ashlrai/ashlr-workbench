# Aider config — Ashlr Workbench
# Docs: https://aider.chat/docs/config/aider_conf.html
#
# This file is loaded explicitly by scripts/start-aider.sh via --config.
# It wires Aider to the local LM Studio endpoint so every edit stays on-box.
#
# Model notes:
#   qwen3-coder-30b is tuned for code edits and handles ~32k context well.
#   Swap by passing --model on the launcher (e.g. `start-aider.sh . --model openai/qwen3-235b-a22b-thinking-2507`).

# ------------------------------------------------------------------
# Model + endpoint
# ------------------------------------------------------------------
model: openai/qwen3-coder-30b
openai-api-base: http://localhost:1234/v1
openai-api-key: lm-studio

# ------------------------------------------------------------------
# Git behavior — AGENT.md-style flow, no surprise commits
# ------------------------------------------------------------------
auto-commits: false
dirty-commits: false
attribute-author: false
attribute-committer: false
gitignore: true

# Respect .aiderignore at repo root (same semantics as .gitignore)
aiderignore: .aiderignore

# ------------------------------------------------------------------
# Repo map — Qwen3-Coder-30B tolerates a generous map budget
# ------------------------------------------------------------------
map-tokens: 4096
map-refresh: auto

# ------------------------------------------------------------------
# UX — colors + streaming for readable terminal sessions
# ------------------------------------------------------------------
pretty: true
stream: true
show-diffs: true

# Terminal colors (tuned for dark background)
user-input-color: "#9cdcfe"
assistant-output-color: "#c586c0"
tool-output-color: "#6a9955"
tool-error-color: "#f48771"
tool-warning-color: "#dcdcaa"

# ------------------------------------------------------------------
# Quality-of-life
# ------------------------------------------------------------------
# Watch files for `# aider` comment triggers
watch-files: true

# Don't auto-lint or auto-test — let the human / AGENT.md drive those
auto-lint: false
auto-test: false

# Suppress analytics + update checks (local-only workflow)
analytics-disable: true
check-update: false

# Chat + input history local to the repo (add to .gitignore or .aiderignore)
chat-history-file: .aider.chat.history.md
input-history-file: .aider.input.history

# ------------------------------------------------------------------
# Aider MCP Bridge — ashlr-plugin tool wrappers via /run
# ------------------------------------------------------------------
# start-aider.sh initializes the bridge before launching Aider, writing
# thin wrapper scripts to a temp bin dir and prepending it to PATH.
# Inside an Aider session use:  /run ashlr__<tool> [args]
#
# Bridge command (invoked by start-aider.sh automatically):
#   bridge-command: bash $WORKBENCH/scripts/aider-mcp-bridge.sh
#
# Available tools (10 ashlr-plugin MCP tools):
#   ashlr__read    — read a file with snipCompact truncation
#   ashlr__grep    — genome-aware repo search
#   ashlr__bash    — run a shell command with head+tail compression
#   ashlr__edit    — strict search/replace with diff output
#   ashlr__ls      — compact directory listing
#   ashlr__tree    — Unicode project tree with size/count
#   ashlr__diff    — semantic + structural diff between files
#   ashlr__http    — HTTP fetch with compression
#   ashlr__orient  — codebase orientation summary
#   ashlr__savings — lifetime token/cost savings report
#
# Prerequisites:
#   - ashlr-plugin cloned at ~/Desktop/ashlr-plugin (ASHLR_PLUGIN_DIR)
#   - bun on PATH  (curl -fsSL https://bun.sh/install | bash)
#   - bun install run inside ~/Desktop/ashlr-plugin
#
# See docs/integration/aider-mcp.md for usage, troubleshooting, and examples.

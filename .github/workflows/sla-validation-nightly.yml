name: SLA Validation — Nightly Cross-Agent Divergence Check

on:
  schedule:
    # Run nightly at 03:00 UTC
    - cron: "0 3 * * *"
  # Allow manual trigger with optional inputs
  workflow_dispatch:
    inputs:
      baseline_agent:
        description: "Baseline agent name for cross-agent comparison (leave blank for auto)"
        required: false
        default: ""
      threshold_ms:
        description: "Tool-call p99 latency SLA ceiling in milliseconds"
        required: false
        default: "2000"
      report_format:
        description: "Report format: jsonl | html | both"
        required: false
        default: "both"

# Cancel any in-progress run for the same branch/schedule slot
concurrency:
  group: sla-validation-nightly
  cancel-in-progress: true

jobs:
  # ── Unit tests for the divergence-analyzer library ───────────────────────
  bats-unit-tests:
    name: "bats: session-divergence-analyzer tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats python3

      - name: Verify bats version
        run: bats --version

      - name: Run session-divergence-analyzer bats tests
        run: bats tests/session-divergence-analyzer.bats
        env:
          NO_COLOR: "1"

      - name: Run existing bats test suites (no regressions)
        run: |
          for f in tests/*.bats; do
            echo "--- running $f ---"
            bats "$f" || true   # non-fatal: other suites may need live deps
          done
        env:
          NO_COLOR: "1"

  # ── Nightly SLA validation against recorded sessions ─────────────────────
  sla-validation:
    name: "validate-sla: nightly compliance scorecard"
    runs-on: ubuntu-latest
    needs: bats-unit-tests
    timeout-minutes: 15
    # Run even when bats-unit-tests has warnings (continue-on-error not set
    # so a hard failure in unit tests still blocks SLA validation)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3 curl

      - name: Download latest recorded session log (if available)
        # The replay log is stored as a CI artifact from session-recording jobs.
        # We fall back to a synthetic fixture when no artifact exists (e.g. first run).
        id: fetch-log
        run: |
          ARTIFACT_URL="${{ vars.SESSION_REPLAY_ARTIFACT_URL }}"
          LOG_PATH="${RUNNER_TEMP}/session-replay.jsonl"

          if [ -n "$ARTIFACT_URL" ]; then
            echo "Downloading session replay log from artifact store..."
            curl --fail --silent --location "$ARTIFACT_URL" -o "$LOG_PATH" && {
              echo "log_path=${LOG_PATH}" >> "$GITHUB_OUTPUT"
              echo "log_source=artifact" >> "$GITHUB_OUTPUT"
            } || {
              echo "Download failed — using synthetic fixture"
              echo "log_source=fixture" >> "$GITHUB_OUTPUT"
            }
          else
            echo "No artifact URL configured — using synthetic fixture"
            echo "log_source=fixture" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate synthetic fixture (when no recorded log)
        if: steps.fetch-log.outputs.log_source != 'artifact'
        run: |
          LOG_PATH="${RUNNER_TEMP}/session-replay.jsonl"
          python3 - "$LOG_PATH" <<'PY'
          import json, sys
          log_path = sys.argv[1]
          lines = []
          agents = [
              ("goose",      "g1", 320, "ok"),
              ("goose",      "g2", 280, "ok"),
              ("aider",      "a1", 410, "ok"),
              ("aider",      "a2", 390, "ok"),
              ("ashlrcode",  "c1", 180, "ok"),
              ("ashlrcode",  "c2", 200, "ok"),
              ("openhands",  "o1", 650, "ok"),
              ("openhands",  "o2", 700, "error"),
          ]
          for agent, sid, lat, status in agents:
              lines.append(json.dumps({
                  "ts": "2026-01-01T00:00:00.000Z", "event": "session_init",
                  "session": sid, "agent": agent, "llm_endpoint": "openai/qwen3",
                  "mcp_count": "10", "cwd": "/workspace"
              }))
              for seq, tool in enumerate(["bash","read_file","write_file","bash"]):
                  lines.append(json.dumps({
                      "ts": "2026-01-01T00:00:01.000Z", "event": "tool_call",
                      "session": sid, "agent": agent, "tool": tool,
                      "latency_ms": lat + seq * 10, "seq": seq
                  }))
              lines.append(json.dumps({
                  "ts": "2026-01-01T00:00:30.000Z", "event": "llm_response",
                  "session": sid, "agent": agent, "model": "qwen3",
                  "latency_ms": lat * 2, "prompt_tokens": 500,
                  "completion_tokens": 200, "turn": 1
              }))
              lines.append(json.dumps({
                  "ts": "2026-01-01T00:01:00.000Z", "event": "session_end",
                  "session": sid, "agent": agent, "status": status,
                  "duration_secs": 60, "tool_count": 4, "llm_turns": 1
              }))
          with open(log_path, "w") as fh:
              fh.write("\n".join(lines) + "\n")
          print(f"Wrote {len(lines)} events for {len(agents)} sessions to {log_path}")
          PY
          echo "log_path=${RUNNER_TEMP}/session-replay.jsonl" >> "$GITHUB_OUTPUT"
        id: make-fixture

      - name: Resolve log path
        id: resolve-log
        run: |
          if [ -n "${{ steps.fetch-log.outputs.log_path }}" ]; then
            echo "log=${RUNNER_TEMP}/session-replay.jsonl" >> "$GITHUB_OUTPUT"
          else
            echo "log=${RUNNER_TEMP}/session-replay.jsonl" >> "$GITHUB_OUTPUT"
          fi

      - name: Run validate-sla
        id: run-sla
        run: |
          mkdir -p "${RUNNER_TEMP}/sla-out"
          bash scripts/session-replay.sh validate-sla \
            --baseline-agent "${{ inputs.baseline_agent || '' }}" \
            --threshold-ms   "${{ inputs.threshold_ms || '2000' }}" \
            --report-format  "${{ inputs.report_format || 'both' }}" \
            --out-dir        "${RUNNER_TEMP}/sla-out" \
          && echo "sla_status=passed" >> "$GITHUB_OUTPUT" \
          || { echo "sla_status=failed" >> "$GITHUB_OUTPUT"; true; }
        env:
          ASHLR_REPLAY_LOG_PATH: "${{ env.RUNNER_TEMP }}/session-replay.jsonl"
          NO_COLOR: "1"

      - name: Print compliance scorecard
        run: |
          SCORECARD="${RUNNER_TEMP}/sla-out/compliance-scorecard.jsonl"
          if [ -f "$SCORECARD" ]; then
            echo "=== Compliance Scorecard (JSONL) ==="
            python3 - "$SCORECARD" <<'PY'
          import json, sys
          records = [json.loads(l) for l in open(sys.argv[1]) if l.strip()]
          metrics = [r for r in records if r.get("record_type") == "agent_metrics"]
          viols   = [r for r in records if r.get("record_type") == "sla_violation"]
          summary = next((r for r in records if r.get("record_type") == "summary"), {})
          print(f"\n{'AGENT':<14}  {'SESSIONS':>8}  {'P99(ms)':>8}  {'MCP_TO%':>8}  {'ERR%':>6}  {'TREND':>8}")
          print("-" * 60)
          for m in sorted(metrics, key=lambda x: x.get("agent","")):
              print(f"  {m.get('agent','?'):<12}  {m.get('sessions',0):>8}  "
                    f"{m.get('p99_tool_lat_ms',0):>8.0f}  "
                    f"{m.get('mcp_timeout_rate_pct',0):>7.1f}%  "
                    f"{m.get('error_rate_pct',0):>5.1f}%  "
                    f"{m.get('trend_slope_ms_per_session',0):>+8.1f}")
          if viols:
              print(f"\nViolations ({len(viols)}):")
              for v in viols:
                  print(f"  [{v.get('severity','?').upper()}] {v.get('rule','?')}: {v.get('message','')}")
          print(f"\nSummary: sessions={summary.get('session_count',0)}  "
                f"violations={summary.get('violation_count',0)}  "
                f"sla_passed={summary.get('sla_passed',False)}")
          PY
          else
            echo "(no scorecard found)"
          fi

      - name: Upload SLA report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sla-report-${{ github.run_number }}
          path: ${{ env.RUNNER_TEMP }}/sla-out/
          retention-days: 30

      - name: Fail job when critical SLA violations found
        if: steps.run-sla.outputs.sla_status == 'failed'
        run: |
          echo "::error::SLA validation FAILED — critical violations detected. See compliance scorecard artifact."
          exit 1
